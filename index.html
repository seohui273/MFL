<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MFL 동아리 커뮤니티</title>
</head>
<body>

    <h1>🚀 MFL 동아리 커뮤니티 게시판</h1>
    <p>우리 동아리원들이 글과 사진을 올리는 공간입니다.</p>

    <hr>

    <div>
        <h3>새 글 작성하기</h3>
        <input type="text" id="title" placeholder="제목을 입력하세요" style="width: 300px;"><br><br>
        <textarea id="content" placeholder="내용을 입력하세요" style="width: 300px; height: 100px;"></textarea><br><br>
        <input type="file" id="imageFile"><br><br>
        <button id="submitBtn">게시글 올리기</button>
    </div>

    <hr>

    <div>
        <h3>전체 게시글 목록</h3>
        <div id="postList">
            <p>아직 등록된 게시글이 없습니다. 첫 글을 작성해 보세요!</p>
        </div>
    </div>

</body>
</html>
